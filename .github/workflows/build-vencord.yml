name: Build Vencord Bundle

on:
  schedule:
    - cron: "0 3 * * *"
  push:                        # ← every push, no paths filter
  workflow_dispatch:
    inputs:
      no_cache:
        description: "Force re-clone Vencord (ignore cache)"
        required: false
        default: "false"
        type: boolean

# Cancel any in-progress bundle build for the same branch so the
# latest push always wins, and nothing else starts until this finishes.
concurrency:
  group: vencord-bundle-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build Vencord + custom plugins
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout VendroidEnhanced
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Cache Vencord source
        if: ${{ inputs.no_cache != 'true' }}
        uses: actions/cache@v4
        with:
          path: .vencord-build
          key: vencord-src-${{ hashFiles('scripts/build-vencord.sh') }}
          restore-keys: vencord-src-

      - name: Run build-vencord.sh
        env:
          PLUGINS_REPO: ${{ secrets.PLUGINS_REPO_URL }}
        run: |
          chmod +x scripts/build-vencord.sh
          EXTRA=""
          if [ "${{ inputs.no_cache }}" = "true" ]; then EXTRA="--no-cache"; fi
          ./scripts/build-vencord.sh $EXTRA

      - name: Commit updated bundle
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add app/src/main/res/raw/vencord_bundle.js
          git diff --cached --quiet && echo "No changes to commit" && exit 0
          VENCORD_COMMIT=$(git -C .vencord-build/Vencord rev-parse --short HEAD 2>/dev/null || echo "unknown")
          git commit -m "chore: update Vencord bundle (vencord@${VENCORD_COMMIT}) [skip ci]"
          git push

      - name: Upload bundle artifact
        uses: actions/upload-artifact@v4
        with:
          name: vencord_bundle
          path: app/src/main/res/raw/vencord_bundle.js
          retention-days: 14

  # ── Trigger your APK workflows after the bundle is committed ─────────────
  trigger-apk-builds:
    name: Trigger APK workflows
    needs: build          # only runs after build succeeds
    runs-on: ubuntu-latest
    steps:
      - name: Trigger APK workflow(s)
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const workflows = [
              "android-build.yml",
              "debug-apk.yml",
            ];
            for (const wf of workflows) {
              await github.rest.actions.createWorkflowDispatch({
                owner: context.repo.owner,
                repo:  context.repo.repo,
                workflow_id: wf,
                ref: context.ref,
              });
              console.log(`Triggered ${wf}`);
            }
