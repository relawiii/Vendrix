name: Build Vencord Bundle

on:
  # Run every day at 3 AM UTC — picks up new Vencord commits automatically
  schedule:
    - cron: "0 3 * * *"
  # Run on every push that touches a plugin or the build script
  push:
    paths:
      - "vencord-plugins/**"
      - "scripts/**"
      - ".github/workflows/build-vencord.yml"
  # Allow manual trigger from the Actions tab
  workflow_dispatch:
    inputs:
      no_cache:
        description: "Force re-clone Vencord (ignore cache)"
        required: false
        default: "false"
        type: boolean

jobs:
  build:
    name: Build Vencord + custom plugins
    runs-on: ubuntu-latest

    steps:
      # ── Checkout ─────────────────────────────────────────────────────────
      - name: Checkout VendroidEnhanced
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      # ── Node setup ───────────────────────────────────────────────────────
      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install pnpm
        run: npm install -g pnpm

      # ── Cache Vencord clone between runs ─────────────────────────────────
      - name: Cache Vencord source
        if: ${{ inputs.no_cache != 'true' }}
        uses: actions/cache@v4
        with:
          path: .vencord-build
          key: vencord-src-${{ hashFiles('scripts/build-vencord.sh') }}
          restore-keys: vencord-src-

      # ── Build ────────────────────────────────────────────────────────────
      - name: Run build-vencord.sh
        run: |
          chmod +x scripts/build-vencord.sh
          EXTRA=""
          if [ "${{ inputs.no_cache }}" = "true" ]; then EXTRA="--no-cache"; fi
          ./scripts/build-vencord.sh $EXTRA

      # ── Commit the updated bundle back to the repo ───────────────────────
      - name: Commit updated bundle
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add app/src/main/res/raw/vencord_bundle.js
          git diff --cached --quiet && echo "No changes to commit" && exit 0
          VENCORD_COMMIT=$(git -C .vencord-build/Vencord rev-parse --short HEAD 2>/dev/null || echo "unknown")
          git commit -m "chore: update Vencord bundle (vencord@${VENCORD_COMMIT}) [skip ci]"
          git push

      # ── Upload bundle as a workflow artifact (for manual inspection) ──────
      - name: Upload bundle artifact
        uses: actions/upload-artifact@v4
        with:
          name: vencord_bundle
          path: app/src/main/res/raw/vencord_bundle.js
          retention-days: 14
